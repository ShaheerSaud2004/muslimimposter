<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1080">
  <title>Have Khafī – Instagram slide</title>
  <style>
    /* 8pt grid, Instagram-friendly 1080×1080 */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1080px;
      height: 1080px;
      background: #FAF8F4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px; /* 6×8pt */
      gap: 40px; /* 5×8pt */
    }
    .headline {
      font-size: 56px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #2C2416;
      line-height: 1.2;
      text-align: center;
    }
    .headline span { color: #8B6914; }
    .sub {
      font-size: 24px;
      font-weight: 500;
      color: #6B5E4A;
      letter-spacing: 0.01em;
    }
    /* Phone frame: 8pt rhythm */
    .phone-wrap {
      width: 320px;
      padding: 12px; /* 1.5×8 */
      background: linear-gradient(145deg, #1a1814 0%, #2C2820 50%, #3a352a 100%);
      border-radius: 48px;
      box-shadow:
        0 32px 64px rgba(0,0,0,0.2),
        0 0 0 3px #4A4234,
        inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .phone-screen {
      width: 100%;
      aspect-ratio: 9 / 19.5;
      border-radius: 36px;
      overflow: hidden;
      background: #2C2820;
    }
    .phone-screen img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .tagline {
      font-size: 20px;
      font-weight: 500;
      color: #6B5E4A;
      text-align: center;
      max-width: 360px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <p class="headline">Have <span>Khafī</span>.</p>
  <p class="sub">خفي</p>
  <div class="phone-wrap">
    <div class="phone-screen">
      <img src="app-screenshot.png" alt="Khafī app">
    </div>
  </div>
  <p class="tagline">The Islamic hidden word game — on you.</p>
</body>
</html>
