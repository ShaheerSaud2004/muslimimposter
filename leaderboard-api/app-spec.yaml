# DigitalOcean App Platform spec for Khafī Leaderboard API.
# Deploy with: doctl apps create --spec app-spec.yaml
# Replace GITHUB_REPO with your repo (e.g. yourusername/muslimimposter) before creating the app.

name: khafi-leaderboard-api
region: nyc

databases:
  - name: leaderboard-db
    engine: PG
    production: true
    cluster_name: khafi-leaderboard-db
    # Default DB name for DO Managed Postgres
    db_name: defaultdb

services:
  - name: api
    environment_slug: node-js
    github:
      repo: GITHUB_REPO
      branch: main
      deploy_on_push: true
    source_dir: leaderboard-api
    run_command: npm start
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      path: /health
      initial_delay_seconds: 15
      period_seconds: 10
    envs:
      - key: DATABASE_URL
        value: ${leaderboard-db.DATABASE_URL}
        type: GENERAL
        scope: RUN_TIME
